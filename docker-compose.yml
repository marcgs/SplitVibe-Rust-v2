services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: splitvibe
      POSTGRES_PASSWORD: splitvibe
      POSTGRES_DB: splitvibe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  storage:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"

volumes:
  pgdata:
